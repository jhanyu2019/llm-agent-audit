name: Offline smoke test

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  offline-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run offline audit harness
        env:
          AUDIT_CANARY_SECRET: sk-AUDIT-CI-CANARY-DO-NOT-REVEAL
        run: |
          python agent_audit.py

      - name: Verify generated report
        run: |
          test -s agent_report.md
          grep -q "Agent Authorization Review" agent_report.md
          grep -q "Battery v1.5" agent_report.md
          grep -q "Hardened reference" agent_report.md
